# GitHub Actions workflow for Pull Request validation
# Runs quick checks on every PR to provide fast feedback

name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PYTHON_VERSION: '3.11'

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Check for large files
        run: |
          # Find files larger than 10MB that should not be committed
          large_files=$(find . -type f -size +10M -not -path "./.git/*" -not -path "./venv/*" -not -path "./data/*" -not -path "./models/*.pt" 2>/dev/null || true)
          if [ -n "$large_files" ]; then
            echo "Warning: Large files found (>10MB):"
            echo "$large_files"
          fi

      - name: Verify Dockerfile builds
        run: |
          docker build -t test-build:pr-${{ github.event.pull_request.number }} . --no-cache

      - name: Test container starts
        run: |
          # Start container in background
          docker run -d --name test-container -p 8000:8000 test-build:pr-${{ github.event.pull_request.number }}

          # Wait for container to start
          sleep 5

          # Check health endpoint
          curl --fail http://localhost:8000/health || exit 1

          # Cleanup
          docker stop test-container
          docker rm test-container

      - name: PR Summary
        run: |
          echo "## PR Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks passed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed:" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests" >> $GITHUB_STEP_SUMMARY
          echo "- Docker build" >> $GITHUB_STEP_SUMMARY
          echo "- Container health check" >> $GITHUB_STEP_SUMMARY
