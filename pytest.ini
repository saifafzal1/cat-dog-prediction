[pytest]
# Pytest configuration file

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = -v --tb=short

# Minimum version requirement
minversion = 7.0

# Warnings filter
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
