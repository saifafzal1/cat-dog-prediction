# Production Docker Compose configuration
# Use with: docker-compose -f deploy/docker-compose/docker-compose.prod.yaml up -d

version: '3.8'

services:
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE:-cats-dogs-classifier}:${IMAGE_TAG:-latest}
    container_name: cats-dogs-api-prod
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - MODEL_PATH=/app/models/best_model.pt
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - PYTHONUNBUFFERED=1
    volumes:
      - model-data:/app/models:ro
      - log-data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: always
    networks:
      - prod-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - prod-network
    profiles:
      - with-proxy

networks:
  prod-network:
    driver: bridge
    name: mlops-prod-network

volumes:
  model-data:
    name: cats-dogs-model-data
  log-data:
    name: cats-dogs-log-data
