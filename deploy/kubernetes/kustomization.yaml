# Kustomize configuration for Kubernetes deployment
# Use with: kubectl apply -k deploy/kubernetes/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: cats-dogs-classifier

namespace: cats-dogs-classifier

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/name: cats-dogs-classifier
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/OWNER/cats-dogs-classifier
    newTag: latest
