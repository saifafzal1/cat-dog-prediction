# Kubernetes Ingress for external access to the API
# Configures routing rules for incoming HTTP traffic

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cats-dogs-api-ingress
  namespace: cats-dogs-classifier
  labels:
    app: cats-dogs-classifier
  annotations:
    # Nginx ingress controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: cats-dogs-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cats-dogs-api-service
                port:
                  number: 80
